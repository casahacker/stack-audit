services:
  stack-audit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
        APP_URL: ${APP_URL}
    image: localhost/stack-audit:latest
    container_name: stack-audit
    restart: on-failure:3
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - APP_URL=${APP_URL}
      - NODE_ENV=production
      - AZURE_DI_ENDPOINT=${AZURE_DI_ENDPOINT:-}
      - AZURE_DI_KEY=${AZURE_DI_KEY:-}
      - EXTRACTION_ENGINE=${EXTRACTION_ENGINE:-local}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    volumes:
      - /data/stack-audit/data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    ports:
      - "127.0.0.1:18088:3000"
    networks:
      - stack-audit-net

networks:
  stack-audit-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.11.0/24
